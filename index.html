<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SAMOTHRACE - Castello Normanno</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html,body{
margin:0;
padding:0;
height:100%;
width:100%;
font-family:Arial;
overflow:hidden;
background:#f4f6f9;
}

/* LOGIN */
#loginPage{
height:100vh;
position:relative;
overflow:hidden;
}

.bg{
position:absolute;
inset:0;
background:url("Catania-Acicastello1_1200x789.jpg") center/cover no-repeat;
filter:blur(10px);
transform:scale(1.1);
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

.container{
position:relative;
z-index:2;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
background:rgba(255,255,255,0.95);
padding:35px;
border-radius:12px;
width:360px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.loginBox input,
.loginBox button{
width:100%;
box-sizing:border-box;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

.loginBox button{
background:#2c3e50;
color:white;
cursor:pointer;
}

/* DASHBOARD */
#dashboard{
display:none;
height:100vh;
width:100vw;
}

.wrapper{
display:flex;
height:100vh;
width:100vw;
}

.sidebar{
width:260px;
background:linear-gradient(180deg,#0b2a4a,#163a66);
color:white;
padding:15px;
display:flex;
flex-direction:column;
align-items:center;
}

.sidebar img{width:120px;margin-bottom:10px;}

.sensor{
width:100%;
padding:12px;
margin-bottom:10px;
background:rgba(255,255,255,0.12);
border-radius:8px;
cursor:pointer;
text-align:center;
}

.active{background:#2d6cdf !important;}

.sidebar-footer{
margin-top:auto;
padding-top:15px;
font-size:11px;
font-style:italic;
color:rgba(255,255,255,0.75);
text-align:center;
}

.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
padding:10px;
box-sizing:border-box;
gap:10px;
}

.charts.pesb{
flex:1;
display:grid;
grid-template-columns:repeat(2,1fr);
grid-template-rows:repeat(2,1fr);
gap:10px;
min-height:0;
}

#airCharts{
flex:1;
display:grid;
grid-template-columns:repeat(5, minmax(0,1fr));
grid-template-rows:repeat(2, minmax(0,1fr));
gap:10px;
min-height:0;
}

.card{
background:white;
border-radius:8px;
display:flex;
flex-direction:column;
overflow:hidden;
border:1px solid #e6e6e6;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card canvas{
flex:1;
width:100%!important;
height:100%!important;
}

.chartTitle{
font-size:12px;
font-weight:600;
padding:5px;
background:#163a66;
color:white;
text-align:center;
}

.historyBox{
height:240px;
margin-top:10px;
background:white;
border-radius:12px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.historyHeader,
.historyRow{
display:grid;
font-size:12px;
grid-template-columns:160px repeat(10,1fr);
}

.historyHeader{
background:#eef2f7;
font-weight:bold;
padding:6px;
}

.historyScroll{
flex:1;
overflow-y:auto;
}

.historyRow{
padding:6px;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
<div class="loginBox">

<img src="logo.jpg" style="width:140px;">
<h2 style="color:#163a66;">Pillar Cultural Heritage</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Accedi</button>

</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="wrapper">

<div class="sidebar">
<img src="logo.jpg">

<div class="sensor active" onclick="setSensor('alta',this)">PESB Alta</div>
<div class="sensor" onclick="setSensor('bassa',this)">PESB Bassa</div>
<div class="sensor" onclick="setSensor('air',this)">Air Quality</div>

<div class="sidebar-footer">
Castello Normanno - Aci Castello (CT)
</div>
</div>

<div class="main">

<div id="pesbCharts" class="charts pesb">
<div class="card"><div class="chartTitle">Temperatura</div><canvas id="c1"></canvas></div>
<div class="card"><div class="chartTitle">Umidità</div><canvas id="c2"></canvas></div>
<div class="card"><div class="chartTitle">Luminosità</div><canvas id="c3"></canvas></div>
<div class="card"><div class="chartTitle">Pressione</div><canvas id="c4"></canvas></div>
</div>

<div id="airCharts" style="display:none"></div>

<div class="historyBox">
<div id="header" class="historyHeader"></div>
<div class="historyScroll">
<div id="history"></div>
</div>
</div>

</div>
</div>
</div>

<script>

const client = mqtt.connect("wss://80.211.107.34:9002",{
username:"root@merimp.com",
password:"$_Merimp_2020"
});

client.on("connect",()=>{
console.log("MQTT connesso");
});

client.on("error",(err)=>{
console.log("Errore MQTT:",err);
});

const topics={
alta:"samothrace/plache/acicastello/sala 1/PESB ALTA",
bassa:"samothrace/plache/acicastello/sala 1/PESB BASSA",
air:"samothrace/plache/acicastello/sala 1/Air_Quality_Detector"
};

let current="alta";

const store={
alta:{labels:[],t:[],h:[],l:[],p:[]},
bassa:{labels:[],t:[],h:[],l:[],p:[]},
air:{labels:[],voc:[],co2:[],nh3:[],o3:[],so2:[],no2:[],pm10:[],pm25:[],pm4:[],pm1:[]}
};

let charts=[];

function login(){
document.getElementById("loginPage").style.display="none";
document.getElementById("dashboard").style.display="flex";
init();
}

function mk(id){
return new Chart(document.getElementById(id),{
type:"line",
data:{labels:[],datasets:[{data:[],borderWidth:2,pointRadius:0}]},
options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}}}
});
}

function init(){

charts=[
mk("c1"),mk("c2"),mk("c3"),mk("c4")
];

client.subscribe(Object.values(topics));

client.on("message",(topic,msg)=>{

const o=JSON.parse(msg.toString()).object;
const t=new Date().toLocaleTimeString();

const target =
topic===topics.alta ? store.alta :
topic===topics.bassa ? store.bassa :
store.air;

target.labels.push(t);

if(topic===topics.air){
target.voc.push(+o.VOC||0);
target.co2.push(+o.CO2||0);
target.nh3.push(+o.NH3||0);
target.o3.push(+o.O3||0);
target.so2.push(+o.SO2||0);
target.no2.push(+o.NO2||0);
target.pm10.push(+o.MassPM10||0);
target.pm25.push(+o.MassPM2||0);
target.pm4.push(+o.MassPM4||0);
target.pm1.push(+o.MassPM1||0);
}else{
target.t.push(+o.Temperature||0);
target.h.push(+o.Humidity||0);
target.l.push(+o.Luminosity||0);
target.p.push(+o.Pressure||0);
}

render();
});
}

function setSensor(s,el){

if(!charts.length) return;

current=s;

document.querySelectorAll(".sensor").forEach(x=>x.classList.remove("active"));
el.classList.add("active");

document.getElementById("pesbCharts").style.display=(s==="air")?"none":"grid";

render();
}

function render(){

const s=store[current];
charts.forEach(c=>c.data.labels=s.labels);

if(current!=="air"){
charts[0].data.datasets[0].data=s.t;
charts[1].data.datasets[0].data=s.h;
charts[2].data.datasets[0].data=s.l;
charts[3].data.datasets[0].data=s.p;
}

charts.forEach(c=>c.update());
}

</script>

</body>
</html>
